name: evals

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  baseline:
    name: baseline (gate rápido, sin modelo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: evals/requirements.txt
      - run: pip install pyyaml
      # umbrales = resultado actual − margen de ruido; si bajan, algo se rompió.
      # Rebajados conscientemente 2026-07-09: corpus 117→133 casos y 13→21
      # capas (euskadi-places) — el held-out es más duro para todos (detalle
      # en evals/README.md).
      - run: python evals/run.py --retriever baseline --lang es --min-pass 70
      - run: python evals/run.py --retriever baseline --lang eu --min-pass 66
      - run: python evals/run.py --retriever baseline --lang es --split heldout --min-pass 57
      - run: python evals/run.py --retriever baseline --lang eu --split heldout --min-pass 59

  hybrid:
    name: hybrid (semántico, con caché de modelo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: evals/requirements.txt
      - name: Caché del modelo de embeddings
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-minilm-multilingual-v1
      - run: pip install -r evals/requirements.txt
      # OJO 2026-07-09: con 21 capas el híbrido PIERDE el held-out ES contra
      # el baseline (58 vs 60) — criterio de despliegue roto; prod sigue en
      # 13 capas (env fijado en service/deploy.sh). Estos gates vigilan
      # regresión del estado medido, no aprueban despliegue.
      - run: python evals/run.py --retriever hybrid --lang es --split heldout --min-pass 55
      - run: python evals/run.py --retriever hybrid --lang eu --split heldout --min-pass 63
      - run: python evals/run.py --retriever hybrid --lang es --min-pass 78
