# Corpus dorado v0 — búsqueda semántica (EMAP Labs L1)
# ------------------------------------------------------
# 50 preguntas con resultado esperado verificable contra los datasets del
# manifest. BORRADOR generado el 2026-07-07 a partir de datos reales
# (9.138 POIs Bizkaia + pois-euskadi); pendiente de curación humana:
#   - revisar euskera (traducciones de trabajo, no nativas)
#   - ajustar radios y min_results tras la primera pasada del retriever
#   - promover status: draft → curated una a una
#
# Formato de cada caso:
#   id:        slug único
#   q:         consulta en es/eu (lo que un usuario escribiría en el buscador)
#   intent:    nearest | attribute | transit | semantic
#   anchor:    dónde está el usuario — se resuelve por nombre contra el
#              dataset indicado (nunca coords inventadas)
#   expected:  qué debe devolver el retriever para contar como acierto
#     layers:      capas/datasets admitidos
#     within_m:    radio máximo del primer resultado al anchor
#     tags:        filtros de atributo que el resultado debe cumplir
#     min_results: mínimo de resultados válidos en el top-k (default 1)
#   answerable: false = aspiracional, el dato aún no existe (sección D);
#               sirve para medir que el sistema DICE que no sabe (no finge)

version: 0
territory: bizkaia
created: 2026-07-07
status: draft
cases:

  # ── A. Más cercano por categoría (nearest) ──────────────────────────

  - id: fountain-moyua
    q: {es: "fuente de agua potable cerca de Moyua", eu: "edateko ur-iturria Moyua inguruan"}
    intent: nearest
    anchor: {layer: metro, name: "Moyua"}
    expected: {layers: [fountains], within_m: 400}

  - id: fountain-casco-viejo
    q: {es: "dónde puedo beber agua en el Casco Viejo", eu: "non edan dezaket ura Zazpikaleetan"}
